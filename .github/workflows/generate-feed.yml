name: Generate Feeds

on:
  schedule:
    # All feeds (tweets, podcasts, blogs): once daily at 12:00 UTC
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch upstream feed files
        run: |
          curl -fsSL -o feed-x.json https://raw.githubusercontent.com/zarazhangrui/follow-builders/main/feed-x.json
          curl -fsSL -o feed-podcasts.json https://raw.githubusercontent.com/zarazhangrui/follow-builders/main/feed-podcasts.json
          curl -fsSL -o feed-blogs.json https://raw.githubusercontent.com/zarazhangrui/follow-builders/main/feed-blogs.json
          curl -fsSL -o state-feed.json https://raw.githubusercontent.com/zarazhangrui/follow-builders/main/state-feed.json

      - name: Commit and push feeds
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feed-x.json feed-podcasts.json feed-blogs.json state-feed.json
          git diff --cached --quiet || git commit -m "chore: sync upstream feeds [skip ci]"
          git push
